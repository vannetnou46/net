    calculateNumber(phoneNumber) {
        const clean = phoneNumber.replace(/[^0-9]/g,'');
        if (!clean || (clean.length!==9 && clean.length!==10)) return null;

        const lastSix = clean.slice(-6);
        const division = parseInt(lastSix)/80;
        const decimal = division.toFixed(10).split('.')[1].substring(0,2);
        const final = parseFloat('0.'+decimal)*80;

        return Math.round(final);
    }

    getPrediction(phoneNumber){
        const number = this.calculateNumber(phoneNumber);
        if(number===null){
            return {success:false,message:'សូមបញ្ចូលលេខ 9 ឬ 10 ខ្ទង់'};

                number:number,
                status:this.predictions[number].status,
                prediction:this.predictions[number].message,
                original_number:phoneNumber
            };
        }else{
            return {success:false,message:'មិនមានទិន្នន័យ'};
        }
    }

const predictor = new PhoneNumberPredictor();

function allowOnlyNumbers(e){
    if(!/[0-9]/.test(e.key) && e.key!=="Backspace"){
        e.preventDefault();
    }
}

function formatPhoneNumber(input){
    input.value = input.value.replace(/[^0-9]/g,'').slice(0,10);
}

    const phone = document.getElementById('phone').value;

    if(!phone){
        showError('សូមបញ្ចូលលេខទូរស័ព្ទ');
        return;
    }

    const result = predictor.getPrediction(phone);
    displayResult(result);
}

function showError(msg){
    const c = document.getElementById('resultContainer');
    c.style.display='block';
    c.innerHTML=`<div class="error-message">${msg}</div>`;
}

function displayResult(result){
    const c = document.getElementById('resultContainer');
    c.style.display='block';

    if(!result.success){
        c.innerHTML=`<div class="error-message">${result.message}</div>`;
        return;
    }

    c.innerHTML=`
    <div class="result status-good">
        <h3>លទ្ធផល</h3>
        <p>លេខ: ${result.original_number}</p>
        <p>លេខគណនា: ${result.number}</p>
        <p>ស្ថានភាព: ${result.status}</p>
        <p>${result.prediction}</p>
    </div>`;
}

</script>

</body>
</html>
